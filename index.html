<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ကားနံပါတ် ထွက်ခွင့်စစ်ဆေးရန်</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f1a;
            --card-bg: rgba(30, 30, 50, 0.4);
            --text: #e0e0ff;
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.3);
            --success: #22c55e;
            --danger: #ef4444;
            --border: rgba(124, 58, 237, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pyidaungsu', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a15, #1a1a2e);
            color: var(--text);
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            margin: 1.5rem 0 2rem;
            text-align: center;
            background: linear-gradient(90deg, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            margin-bottom: 2rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 48px var(--accent-glow);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        input {
            padding: 1rem 1.2rem;
            font-size: 1.1rem;
            background: rgba(50, 50, 80, 0.5);
            border: 1px solid var(--border);
            border-radius: 1rem;
            color: var(--text);
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
            background: rgba(60, 60, 90, 0.6);
        }

        input::placeholder {
            color: rgba(224, 224, 255, 0.5);
        }

        button {
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--accent), #5b21b6);
            color: white;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        button:active {
            transform: translateY(1px);
        }

        #result {
            margin-top: 1.5rem;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            padding: 1rem;
            border-radius: 1rem;
            background: rgba(30, 30, 50, 0.6);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }

        #result.success {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.4);
        }

        #result.danger {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        #calendar {
            width: 100%;
            max-width: 600px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0.5rem;
            background: transparent;
            font-size: 1.1rem;
        }

        th, td {
            padding: 1.2rem;
            text-align: center;
            border-radius: 1rem;
            font-weight: 500;
        }

        th {
            background: rgba(30, 30, 50, 0.6);
            backdrop-filter: blur(10px);
            color: #c4b5fd;
            font-size: 1rem;
        }

        td {
            background: rgba(20, 20, 40, 0.4);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            cursor: default;
        }

        td.even {
            background: rgba(59, 130, 246, 0.15);
        }

        td.odd {
            background: rgba(139, 92, 246, 0.15);
        }

        td.today {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.5), rgba(91, 33, 182, 0.5)) !important;
            color: white;
            font-weight: bold;
            box-shadow: 0 0 15px var(--accent-glow);
            transform: scale(1.05);
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            .card {
                padding: 1.5rem;
            }
            h1 {
                margin: 1rem 0 1.5rem;
            }
            #calendar {
                max-width: 100%;
            }
            table {
                font-size: 1rem;
                border-spacing: 0.3rem;
            }
            th, td {
                padding: 0.8rem 0.5rem;
            }
            th {
                font-size: 0.9rem;
            }
        }

        @media (min-width: 768px) {
            #calendar {
                max-width: 700px;
            }
            table {
                font-size: 1.2rem;
            }
            th, td {
                padding: 1.5rem;
            }
            th {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body onload="generateCalendar()">
    <h1>ကားနံပါတ် ထွက်ခွင့်စစ်ဆေးရန်</h1>

    <div class="card">
        <div class="input-group">
            <input id="prefix" placeholder="ရှေ့ဆုံး ကိုထည့်ပါ (ဥပမာ ၂A)" maxlength="3">
            <button onclick="check()">စစ်ဆေးပါ</button>
        </div>
        <div id="result"></div>
    </div>

    <div id="calendar" class="card">
        <!-- Calendar generated by JS -->
    </div>

    <script>
        function check() {
            const prefix = document.getElementById('prefix').value.trim().toUpperCase();
            const resultEl = document.getElementById('result');

            if (!prefix) {
                resultEl.textContent = 'နံပါတ်ထည့်ပါ။';
                resultEl.className = '';
                return;
            }

            const firstChar = prefix.charAt(0);
            const startingNum = parseInt(firstChar);

            if (isNaN(startingNum) || startingNum < 0 || startingNum > 9) {
                resultEl.textContent = 'ရှေ့ဆုံးဂဏန်းဖြင့် စရပါ။';
                resultEl.className = '';
                return;
            }

            const isEvenStart = startingNum % 2 === 0;
            const today = new Date();
            const day = today.getDate();
            const isEvenDay = day % 2 === 0;

            const allowed = (isEvenDay && isEvenStart) || (!isEvenDay && !isEvenStart);

            resultEl.textContent = allowed 
                ? 'ယနေ့ ထွက်ခွင့်ရှိပါတယ် 🚗💨' 
                : 'ယနေ့ ထွက်ခွင့်မရှိပါ 😔';
            
            resultEl.className = allowed ? 'success' : 'danger';
        }

        function generateCalendar() {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            const firstDay = new Date(year, month, 1);
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const dayOfWeek = firstDay.getDay();

            const weekdays = ['နွေ', 'လာ', 'ဂါ', 'ဟူး', 'ကြာ', 'သော', 'နေ'];

            let table = '<table><tr>';
            weekdays.forEach(day => {
                table += `<th>${day}</th>`;
            });
            table += '</tr><tr>';

            for (let i = 0; i < dayOfWeek; i++) {
                table += '<td></td>';
            }

            let currentDay = 1;
            for (let i = dayOfWeek; i < 7; i++) {
                table += createDayCell(currentDay, today.getDate());
                currentDay++;
            }
            table += '</tr>';

            while (currentDay <= daysInMonth) {
                table += '<tr>';
                for (let i = 0; i < 7 && currentDay <= daysInMonth; i++) {
                    table += createDayCell(currentDay, today.getDate());
                    currentDay++;
                }
                table += '</tr>';
            }

            table += '</table>';
            document.getElementById('calendar').innerHTML = table;
        }

        function createDayCell(day, todayDate) {
            const parityClass = day % 2 === 0 ? 'even' : 'odd';
            const todayClass = day === todayDate ? ' today' : '';
            return `<td class="${parityClass}${todayClass}">${day}</td>`;
        }
    </script>
</body>
</html>
